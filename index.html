<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dialex</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f8;
  transition: 0.3s;
}

.app {
  max-width: 700px;
  margin: 40px auto;
  padding: 20px;
}

.box {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 120px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  margin: 5px;
  cursor: pointer;
}

.primary { background: #2563eb; color: white; }
.swap { background: #10b981; color: white; }
.danger { background: #ef4444; color: white; }

body.dark {
  background: #0f172a;
  color: white;
}

body.dark .box {
  background: #1e293b;
  color: white;
}
</style>
</head>

<body>

<div class="app">

  <h1>Dialex 🌍</h1>

  <div class="box">
    <textarea id="input"></textarea>
  </div>

  <div>
    <button class="primary" onclick="traduci()">Traduci</button>
    <button class="swap" onclick="scambiaLingue()">Scambia</button>
    <button class="danger" onclick="reset()">Reset</button>
    <button class="swap" onclick="toggleDark()">🌙</button>
  </div>

  <div class="box">
    <div id="output"></div>
  </div>

</div>

<script src="dizionario.js"></script>
<script src="script.js"></script>

</body>
</html>
