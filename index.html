<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dialex</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>

.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 80%;
  max-width: 320px;
  text-align: center;
  animation: pop 0.25s ease;
}

.popup-icon {
  font-size: 40px;
}

.popup-buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.install {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
  flex: 1;
}

.close {
  background: #e5e7eb;
  border: none;
  padding: 10px;
  border-radius: 10px;
  flex: 1;
}

.hidden {
  display: none;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* APP STYLE */

body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.app{
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
  border:none;
  outline:none;
  font-size:16px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{ background:#2563eb; color:white; }
.swap{ background:#10b981; color:white; }
.danger{ background:#ef4444; color:white; }

</style>
</head>

<body>

<!-- POPUP INSTALL -->
<div id="installPopup" class="popup hidden">
  <div class="popup-card">

    <div class="popup-icon">📱</div>

    <h2>Installa Dialex</h2>
    <p>Usa Dialex come app veloce e offline</p>

    <div class="popup-buttons">
      <button id="installBtnPopup" class="install">Installa</button>
      <button id="closePopup" class="close">Ora no</button>
    </div>

  </div>
</div>

<div class="app">

  <h1>Dialex 🌍</h1>

  <div class="box">
    <textarea id="input" placeholder="Scrivi qui..."></textarea>
  </div>

  <button class="primary" onclick="traduci()">Traduci</button>
  <button class="swap" onclick="scambiaLingue()">Scambia</button>
  <button class="danger" onclick="reset()">Reset</button>

  <div class="box">
    <div id="output"></div>
  </div>

</div>

<script src="dizionario.js"></script>
<script src="script.js"></script>

</body>
</html>
