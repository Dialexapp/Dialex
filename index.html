<!DOCTYPE html>
<html lang="it">
<head>

  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

  <meta name="description" content="Dialex è un traduttore italiano-napoletano veloce e offline">
<meta name="theme-color" content="#0f172a">
<meta name="application-name" content="Dialex">
  
  <meta name="description" content="Dialex è un traduttore italiano - napoletano veloce e offline">
<meta name="application-name" content="Dialex">
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dialex</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>

  .popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.popup-card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 80%;
  max-width: 320px;
  text-align: center;
  animation: pop 0.25s ease;
}

.popup-icon {
  font-size: 40px;
}

.popup-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.install {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
  flex: 1;
  margin-right: 5px;
}

.close {
  background: #e5e7eb;
  border: none;
  padding: 10px;
  border-radius: 10px;
  flex: 1;
}

.hidden {
  display: none;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
  
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  transition:.3s;
}

.app{
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

h1{
  text-align:center;
}

.box{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,.1);
}

textarea{
  width:100%;
  height:120px;
  border:none;
  outline:none;
  resize:none;
  font-size:16px;
  background:transparent;
}

.buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
}

.primary{
  background:#2563eb;
  color:white;
}

.swap{
  background:#10b981;
  color:white;
}

.danger{
  background:#ef4444;
  color:white;
}

body.dark{
  background:#0f172a;
  color:white;
}

body.dark .box{
  background:#1e293b;
}

body.dark textarea{
  background:#1e293b;
  color:white;
}

body.dark #output{
  color:white;
}
</style>

</head>

<div id="installPopup" class="popup hidden">
  <div class="popup-card">
    
    <div class="popup-icon">📱</div>

    <h2>Installa Dialex</h2>
    <p>Usa l’app offline, veloce e sempre disponibile come una vera app.</p>

    <div class="popup-buttons">
      <button id="installBtn" class="install">Installa</button>
      <button id="closePopup" class="close">Ora no</button>
    </div>

  </div>
</div>
  
<body>

<div class="app">

<div style="text-align:right;">
<button class="swap" onclick="toggleDark()">🌙</button>
</div>

<h1>Dialex 🌍</h1>

<div class="box">
<textarea id="input" placeholder="Inserisci il testo..."></textarea>
</div>

<div class="buttons">
<button class="primary" onclick="traduci()">Traduci</button>
<button class="swap" onclick="scambiaLingue()">Scambia</button>
<button class="danger" onclick="reset()">Reset</button>
  <button id="installBtn" class="primary" style="display:none;">
  Installa App
  </button>
</div>

<div class="box">
<div id="output"></div>
</div>

</div>

<script src="dizionario.js"></script>
<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>

</body>
</html>
