<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dialex</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(8px);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.hidden{
display:none;
}

.popup-card{
background:#fff;
width:100%;
max-width:370px;
border-radius:28px;
padding:22px;
box-shadow:0 20px 60px rgba(0,0,0,.25);
animation:pop .25s ease;
}

.popup-header{
display:flex;
align-items:center;
gap:16px;
}

.popup-logo{
width:72px;
height:72px;
border-radius:18px;
}

.popup-header h2{
margin:0;
font-size:24px;
}

.popup-header span{
color:#666;
font-size:14px;
}

.popup-text{
margin:20px 0;
line-height:1.5;
color:#444;
}

.popup-buttons{
display:flex;
gap:12px;
}

.popup-primary{
flex:1;
background:#0F9D58;
color:white;
font-weight:bold;
padding:12px;
border:none;
border-radius:12px;
transition:.2s;
}

.popup-primary:hover{
background:#0c874b;
}

.popup-primary:active{
transform:scale(.96);
}

.popup-secondary{
flex:1;
background:#ececec;
color:#222;
padding:12px;
border:none;
border-radius:12px;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* APP STYLE */

body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.app{
  max-width:700px;
  margin:40px auto;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

textarea{
  width:100%;
  height:120px;
  border:none;
  outline:none;
  font-size:16px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{ background:#2563eb; color:white; }
.swap{ background:#10b981; color:white; }
.danger{ background:#ef4444; color:white; }

</style>
</head>

<body>

<!-- POPUP INSTALL -->
<div id="installPopup" class="popup hidden">

  <div class="popup-card">

    <div class="popup-header">

      <img src="icon-192.png" class="popup-logo" alt="Dialex">

      <div>
        <h2>Dialex</h2>
        <span>Traduttore Italiano ↔ Napoletano</span>
      </div>

    </div>

    <p class="popup-text">
      Installa Dialex per usarlo come una vera app. Più veloce, sempre disponibile e accessibile dalla schermata Home.
    </p>

    <div class="popup-buttons">
      <button id="closePopup" class="popup-secondary">Più tardi</button>
      <button id="installBtnPopup" class="popup-primary">Installa</button>
    </div>

  </div>

</div>

<div class="app">

  <h1>Dialex 🌍</h1>

  <div class="box">
    <textarea id="input" placeholder="Scrivi qui..."></textarea>
  </div>

  <button class="primary" onclick="traduci()">Traduci</button>
  <button class="swap" onclick="scambiaLingue()">Scambia</button>
  <button class="danger" onclick="reset()">Reset</button>

  <div class="box">
    <div id="output"></div>
  </div>

</div>

<script src="dizionario.js"></script>
<script src="script.js"></script>

</body>
</html>
