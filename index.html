<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dialex</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
/* TUO CSS VA BENE, NON TOCCATO */
</style>
</head>

<body>

<div id="installPopup" class="popup hidden">
  <div class="popup-card">

    <div class="popup-header">

      <img src="icon-192.png" class="popup-logo" alt="Dialex">

      <div>
        <h2>Dialex</h2>
        <span>Traduttore Italiano ↔ Napoletano</span>
      </div>

    </div>

    <p class="popup-text">
      Installa Dialex per usarlo come una vera app.
    </p>

    <div class="popup-buttons">
      <button id="closePopup" class="popup-secondary">Più tardi</button>
      <button id="installBtnPopup" class="popup-primary">Installa</button>
    </div>

  </div>
</div>

<div class="app">

  <h1>Dialex 🌍</h1>

  <div class="box">
    <textarea id="input"></textarea>
  </div>

  <button class="primary" onclick="traduci()">Traduci</button>
  <button class="swap" onclick="scambiaLingue()">Scambia</button>
  <button class="danger" onclick="reset()">Reset</button>

  <div class="box">
    <div id="output"></div>
  </div>

</div>

<script src="dizionario.js"></script>
<script src="script.js"></script>

</body>
</html>
