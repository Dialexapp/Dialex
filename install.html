<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Installa Dialex</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding:20px;
}

.card{
max-width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
}

img{
width:90px;
border-radius:20px;
margin-bottom:10px;
}

h1{
margin:10px 0;
}

p{
opacity:.8;
line-height:1.4;
}

button{
margin-top:20px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.install{
background:#0F9D58;
color:white;
}

.enter{
background:#2563eb;
color:white;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<img src="icon-192.png">

<h1>Dialex</h1>

<p>
Traduttore Italiano ↔ Napoletano<br>
Usalo offline come una vera app.
</p>

<button class="install" id="installBtn">Installa App</button>

<button class="enter" onclick="enterApp()">Apri App</button>

</div>

<script>

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
e.preventDefault();
deferredPrompt = e;
});

document.getElementById("installBtn").addEventListener("click", async ()=>{

if(!deferredPrompt) return;

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

});

function enterApp(){
window.location.href="index.html";
}

</script>

</body>
</html>
